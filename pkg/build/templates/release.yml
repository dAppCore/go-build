name: Release

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory that contains the Core project.
        required: false
        type: string
        default: .
      core-version:
        description: Core CLI version to install.
        required: false
        type: string
        default: latest
      go-version:
        description: Go version to install for Go, Wails, and toolchain-backed builds.
        required: false
        type: string
        default: "1.26"
      node-version:
        description: Node.js version to install for Node and Wails frontend builds.
        required: false
        type: string
        default: "22.x"
      wails-version:
        description: Wails CLI version to install when a Wails project is detected.
        required: false
        type: string
        default: latest
      version:
        description: Release version override.
        required: false
        type: string
        default: ""
      build-name:
        description: Override the build output name passed to `core build`.
        required: false
        type: string
        default: ""
      build-tags:
        description: Comma- or space-separated Go build tags forwarded to `core build`.
        required: false
        type: string
        default: ""
      build-obfuscate:
        description: Enable garble-backed obfuscation for Go and Wails builds.
        required: false
        type: boolean
        default: false
      nsis:
        description: Enable NSIS packaging for Windows Wails builds.
        required: false
        type: boolean
        default: false
      deno-build:
        description: Override the Deno frontend build command.
        required: false
        type: string
        default: ""
      wails-build-webview2:
        description: Set the WebView2 delivery mode for Windows Wails builds.
        required: false
        type: string
        default: ""
      draft:
        description: Mark the release as a draft.
        required: false
        type: boolean
        default: false
      prerelease:
        description: Mark the release as a pre-release.
        required: false
        type: boolean
        default: false
      archive-format:
        description: Archive compression format for release artefacts.
        required: false
        type: string
        default: ""
      build-cache:
        description: Restore and save build cache directories across workflow runs.
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      working-directory:
        description: Directory that contains the Core project.
        required: false
        type: string
        default: .
      core-version:
        description: Core CLI version to install.
        required: false
        type: string
        default: latest
      go-version:
        description: Go version to install for Go, Wails, and toolchain-backed builds.
        required: false
        type: string
        default: "1.26"
      node-version:
        description: Node.js version to install for Node and Wails frontend builds.
        required: false
        type: string
        default: "22.x"
      wails-version:
        description: Wails CLI version to install when a Wails project is detected.
        required: false
        type: string
        default: latest
      version:
        description: Release version override.
        required: false
        type: string
        default: ""
      build-name:
        description: Override the build output name passed to `core build`.
        required: false
        type: string
        default: ""
      build-tags:
        description: Comma- or space-separated Go build tags forwarded to `core build`.
        required: false
        type: string
        default: ""
      build-obfuscate:
        description: Enable garble-backed obfuscation for Go and Wails builds.
        required: false
        type: boolean
        default: false
      nsis:
        description: Enable NSIS packaging for Windows Wails builds.
        required: false
        type: boolean
        default: false
      deno-build:
        description: Override the Deno frontend build command.
        required: false
        type: string
        default: ""
      wails-build-webview2:
        description: Set the WebView2 delivery mode for Windows Wails builds.
        required: false
        type: string
        default: ""
      draft:
        description: Mark the release as a draft.
        required: false
        type: boolean
        default: false
      prerelease:
        description: Mark the release as a pre-release.
        required: false
        type: boolean
        default: false
      archive-format:
        description: Archive compression format for release artefacts.
        required: false
        type: string
        default: ""
      build-cache:
        description: Restore and save build cache directories across workflow runs.
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux/amd64
            artifact_name: linux-amd64
            runner: ubuntu-latest
          - target: linux/arm64
            artifact_name: linux-arm64
            runner: ubuntu-latest
          - target: darwin/amd64
            artifact_name: darwin-amd64
            runner: macos-13
          - target: darwin/arm64
            artifact_name: darwin-arm64
            runner: macos-14
          - target: windows/amd64
            artifact_name: windows-amd64
            runner: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        if: hashFiles(format('{0}/go.mod', inputs.working-directory), format('{0}/go.work', inputs.working-directory), format('{0}/**/go.mod', inputs.working-directory), format('{0}/**/go.work', inputs.working-directory)) != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Setup Node
        if: hashFiles(format('{0}/**/package.json', inputs.working-directory)) != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Enable Corepack
        if: hashFiles(format('{0}/**/package.json', inputs.working-directory)) != ''
        shell: bash
        run: |
          set -euo pipefail
          corepack enable

      - name: Install Wails CLI
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v go >/dev/null 2>&1; then
            echo "Go is not available; skipping Wails CLI installation."
            exit 0
          fi

          has_wails_frontend=false

          if [ -f wails.json ]; then
            has_wails_frontend=true
          elif [ -f go.mod ] || [ -f go.work ]; then
            if [ -f package.json ] || [ -f deno.json ] || [ -f deno.jsonc ] || [ -f frontend/package.json ] || [ -f frontend/deno.json ] || [ -f frontend/deno.jsonc ]; then
              has_wails_frontend=true
            elif find . -maxdepth 3 \( -name package.json -o -name deno.json -o -name deno.jsonc \) \
              -not -path './package.json' \
              -not -path './deno.json' \
              -not -path './deno.jsonc' \
              -not -path './frontend/package.json' \
              -not -path './frontend/deno.json' \
              -not -path './frontend/deno.jsonc' \
              -not -path '*/node_modules/*' | grep -q .; then
              has_wails_frontend=true
            fi
          fi

          if [ "$has_wails_frontend" != "true" ]; then
            echo "No Wails project detected; skipping Wails CLI installation."
            exit 0
          fi

          package='github.com/wailsapp/wails/v2/cmd/wails'
          if [ -f go.mod ] && grep -q 'github.com/wailsapp/wails/v3' go.mod; then
            package='github.com/wailsapp/wails/v3/cmd/wails3'
          fi

          go install "${package}@${{ inputs.wails-version }}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Install Core CLI
        uses: dAppCore/build@v3
        with:
          command: build
          working-directory: ${{ inputs.working-directory }}
          core-version: ${{ inputs.core-version }}

      - name: Setup Python for Conan and MkDocs
        if: hashFiles(format('{0}/CMakeLists.txt', inputs.working-directory), format('{0}/mkdocs.yml', inputs.working-directory), format('{0}/mkdocs.yaml', inputs.working-directory), format('{0}/docs/mkdocs.yml', inputs.working-directory), format('{0}/docs/mkdocs.yaml', inputs.working-directory)) != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan
        if: hashFiles(format('{0}/CMakeLists.txt', inputs.working-directory)) != ''
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install conan

      - name: Install MkDocs
        if: hashFiles(format('{0}/mkdocs.yml', inputs.working-directory), format('{0}/mkdocs.yaml', inputs.working-directory), format('{0}/docs/mkdocs.yml', inputs.working-directory), format('{0}/docs/mkdocs.yaml', inputs.working-directory)) != ''
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install mkdocs

      - name: Setup Deno
        if: hashFiles(format('{0}/**/deno.json', inputs.working-directory), format('{0}/**/deno.jsonc', inputs.working-directory)) != ''
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Restore build cache
        if: inputs.build-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ inputs.working-directory }}/.core/cache
            ${{ inputs.working-directory }}/cache
          key: >-
            core-build-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles(format('{0}/.core/build.yaml', inputs.working-directory), format('{0}/**/go.sum', inputs.working-directory), format('{0}/**/go.work.sum', inputs.working-directory), format('{0}/**/package-lock.json', inputs.working-directory), format('{0}/**/pnpm-lock.yaml', inputs.working-directory), format('{0}/**/yarn.lock', inputs.working-directory), format('{0}/**/bun.lock', inputs.working-directory), format('{0}/**/bun.lockb', inputs.working-directory), format('{0}/**/deno.lock', inputs.working-directory), format('{0}/**/composer.lock', inputs.working-directory), format('{0}/**/poetry.lock', inputs.working-directory), format('{0}/**/requirements.txt', inputs.working-directory), format('{0}/**/Cargo.lock', inputs.working-directory)) }}
          restore-keys: |
            core-build-${{ runner.os }}-${{ matrix.target }}-
            core-build-${{ runner.os }}-

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          set -euo pipefail

          has_wails_frontend=false

          if [ -f wails.json ]; then
            has_wails_frontend=true
          elif [ -f go.mod ] || [ -f go.work ]; then
            if [ -f package.json ] || [ -f deno.json ] || [ -f deno.jsonc ] || [ -f frontend/package.json ] || [ -f frontend/deno.json ] || [ -f frontend/deno.jsonc ]; then
              has_wails_frontend=true
            elif find . -maxdepth 3 \( -name package.json -o -name deno.json -o -name deno.jsonc \) \
              -not -path './package.json' \
              -not -path './deno.json' \
              -not -path './deno.jsonc' \
              -not -path './frontend/package.json' \
              -not -path './frontend/deno.json' \
              -not -path './frontend/deno.jsonc' \
              -not -path '*/node_modules/*' | grep -q .; then
              has_wails_frontend=true
            fi
          fi

          if [ "$has_wails_frontend" != "true" ]; then
            echo "No Wails frontend detected; skipping Linux system dependencies."
            exit 0
          fi

          webkit_pkg=libwebkit2gtk-4.0-dev
          if [ -f /etc/os-release ]; then
            . /etc/os-release
            if [ "${ID:-}" = "ubuntu" ] && dpkg --compare-versions "${VERSION_ID:-0}" ge "24.04"; then
              webkit_pkg=libwebkit2gtk-4.1-dev
            fi
          fi

          sudo apt-get update
          sudo apt-get install -y "$webkit_pkg"

      - name: Build release artefacts
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          set -euo pipefail

          args=(core build --targets "${{ matrix.target }}" --archive --checksum)

          if [ -n "${{ inputs.archive-format }}" ]; then
            args+=(--archive-format "${{ inputs.archive-format }}")
          fi

          if [ -n "${{ inputs.build-name }}" ]; then
            args+=(--build-name "${{ inputs.build-name }}")
          fi

          if [ -n "${{ inputs.build-tags }}" ]; then
            args+=(--build-tags "${{ inputs.build-tags }}")
          fi

          if [ "${{ inputs.build-obfuscate }}" = "true" ]; then
            args+=(--build-obfuscate)
          fi

          if [ "${{ inputs.nsis }}" = "true" ]; then
            args+=(--nsis)
          fi

          if [ -n "${{ inputs.deno-build }}" ]; then
            args+=(--deno-build "${{ inputs.deno-build }}")
          fi

          if [ -n "${{ inputs.wails-build-webview2 }}" ]; then
            args+=(--wails-build-webview2 "${{ inputs.wails-build-webview2 }}")
          fi

          if [ "${{ inputs.build-cache }}" = "true" ]; then
            args+=(--build-cache)
          else
            args+=(--build-cache=false)
          fi

          "${args[@]}"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: ${{ inputs.working-directory }}/dist/**
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: ${{ inputs.working-directory }}/dist
          merge-multiple: true

      - name: Install Core CLI
        uses: dAppCore/build@v3
        with:
          command: ci
          working-directory: ${{ inputs.working-directory }}
          core-version: ${{ inputs.core-version }}
          version: ${{ inputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          we-are-go-for-launch: true
